site_name: Nextflow Strict Syntax Migration Workshop
site_url: https://lescai-teaching.github.io/
repo_url: https://github.com/lescai-teaching/nextflow_strict_syntax_2026
repo_name: lescai-teaching/nextflow_strict_syntax_2026

nav:
  - Home: index.md
  - Orientation: orientation.md
  - Core path (strict migration):
    - Part 1 - 26.04 Strict Parser: part1_strict_parser.md
    - Part 2 - Script-Level Syntax: part2_script_syntax.md
    - Part 3 - Workflows and Modules: part3_workflows_modules.md
    - Part 4 - Process Syntax: part4_process_syntax.md
    - Part 5 - nf-core and Config: part5_nfcore_config.md
    - Capstone: capstone.md
  - Extended path (26.04 modernization):
    - Part 6 - Static Typing and Records: part6_static_types.md
    - Part 7 - Topics and Workflow Outputs: part7_workflow_outputs.md
    - Part 8 - Module Registry: part8_module_registry.md
  - Wrap-up: wrap_up.md
  - Help: help.md

theme:
  name: material
  language: en
  logo: assets/images/lab-compute-logo-white.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
  features:
    - content.code.copy
    - navigation.footer
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search
